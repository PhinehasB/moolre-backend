spring:
  application:
    name: klare-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: klare-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          lob:
            non_contextual_creation: true
        connection:
          provider_disables_autocommit: true
        format_sql: false
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    test-connection: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

klare:
  app:
    password-reset-url: ${APP_PASSWORD_RESET_URL:http://localhost:3000/reset-password}
    api-base-url: ${APP_API_BASE_URL:http://localhost:8080}
    login-url: ${APP_LOGIN_URL:http://localhost:3000/login}
  mail:
    from-address: ${MAIL_FROM_ADDRESS:no-reply@klare.app}
    from-name: ${MAIL_FROM_NAME:Klare}
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:klare-business}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P30D}
      session-token-ttl: ${JWT_SESSION_TTL:PT12H}
    refresh-token:
      pepper: ${REFRESH_TOKEN_PEPPER}
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:5}
      lock-duration: ${LOGIN_LOCK_DURATION:PT15M}
    password-reset:
      token-ttl: ${PASSWORD_RESET_TOKEN_TTL:PT30M}
    email-verification:
      token-ttl: ${EMAIL_VERIFICATION_TOKEN_TTL:P2D}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,Idempotency-Key,X-Requested-With
      exposed-headers: Idempotency-Replayed
      allow-credentials: true
      max-age: 3600
  rate-limit:
    enabled: true
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:10}
      refill-period: ${RATE_LIMIT_AUTH_REFILL_PERIOD:PT1M}
    global:
      capacity: ${RATE_LIMIT_GLOBAL_CAPACITY:120}
      refill-tokens: ${RATE_LIMIT_GLOBAL_REFILL_TOKENS:120}
      refill-period: ${RATE_LIMIT_GLOBAL_REFILL_PERIOD:PT1M}
  idempotency:
    enabled: true
    ttl: ${IDEMPOTENCY_TTL:PT24H}
  payroll:
    service-fee-percent: ${PAYROLL_SERVICE_FEE_PERCENT:0.5}
  moolre:
    env: ${MOOLRE_ENV:sandbox}
    callback-url: ${MOOLRE_CALLBACK_URL:}
    currency: GHS
    sandbox:
      base-url: ${MOOLRE_SANDBOX_BASE_URL:https://sandbox.moolre.com}
      api-user: ${MOOLRE_SANDBOX_API_USER:}
      api-key: ${MOOLRE_SANDBOX_API_KEY:}
      api-pubkey: ${MOOLRE_SANDBOX_API_PUBKEY:}
      account-number: ${MOOLRE_SANDBOX_ACCOUNT_NUMBER:}
      callback-secret: ${MOOLRE_SANDBOX_CALLBACK_SECRET:}
    live:
      base-url: ${MOOLRE_LIVE_BASE_URL:https://api.moolre.com}
      api-user: ${MOOLRE_LIVE_API_USER:}
      api-key: ${MOOLRE_LIVE_API_KEY:}
      api-pubkey: ${MOOLRE_LIVE_API_PUBKEY:}
      account-number: ${MOOLRE_LIVE_ACCOUNT_NUMBER:}
      callback-secret: ${MOOLRE_LIVE_CALLBACK_SECRET:}
